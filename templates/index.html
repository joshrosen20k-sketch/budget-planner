<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Budget Planner</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Budget" />
  <meta name="theme-color" content="#2b6cb0" />
</head>
<body id="app" class="theme-{{ theme or 'ocean' }}" {% if background %}style="background-image: url('/static/{{ background }}');"{% endif %}>

  <div class="overlay"></div>
  <div class="toast" id="toast"></div>

  <!-- HOME PAGE -->
  <div class="container" id="page-home">
    <h1 class="title">Budget Planner</h1>

    <div class="card">
      <h2>Your Info</h2>
      <div class="form-grid">
        <label>Current Balance ($)</label>
        <input type="number" id="balance" placeholder="e.g. 100" value="{{ balance if balance is not none else '' }}" onblur="autoSave()" />
        <label>Monthly Income ($)</label>
        <input type="number" id="income" placeholder="e.g. 200" value="{{ monthly_income if monthly_income is not none else '' }}" onblur="autoSave()" />
        <label>Monthly Expenses ($)</label>
        <input type="number" id="expenses" placeholder="e.g. 50" value="{{ monthly_expenses if monthly_expenses is not none else '' }}" onblur="autoSave()" />
      </div>
    </div>

    <div class="home-actions">
      <button class="btn-primary" onclick="calculate()">Calculate</button>
      <button class="btn-secondary" onclick="showPage('new-goal')">+ New Goal</button>
    </div>

    <div id="home-goals-slot"></div>

    <div class="card">
      <h2>Tax & Settings</h2>
      <div class="form-grid">
        <label>Your State</label>
        <div style="display:flex;gap:8px;">
          <input type="text" id="state-input" placeholder="e.g. NY" maxlength="2" style="text-transform:uppercase;width:80px;" value="{{ state or '' }}" />
          <button class="btn-secondary" onclick="saveState()">Save</button>
        </div>
        <label>Sales Tax Rate</label>
        <span id="tax-display" class="cyan">{% if tax_rate is not none %}{{ tax_rate }}%{% else %}Not set{% endif %}</span>
      </div>
      <label class="upload-label" style="margin-top:14px;">
        Change Background
        <input type="file" id="bg-upload" accept="image/*" hidden />
      </label>
      <div style="margin-top:16px;">
        <div style="font-size:0.875rem;color:var(--c-text-dim);margin-bottom:8px;">Theme</div>
        <div class="theme-picker">
          <button class="theme-swatch" data-theme="ocean"  title="🌊 Ocean"      onclick="setTheme('ocean')"  style="background:linear-gradient(135deg,#2b6cb0,#4299e1)"></button>
          <button class="theme-swatch" data-theme="galaxy" title="🌌 Galaxy"     onclick="setTheme('galaxy')" style="background:linear-gradient(135deg,#553c9a,#b794f4)"></button>
          <button class="theme-swatch" data-theme="forest" title="🌲 Forest"     onclick="setTheme('forest')" style="background:linear-gradient(135deg,#276749,#48bb78)"></button>
          <button class="theme-swatch" data-theme="ember"  title="🔥 Ember"      onclick="setTheme('ember')"  style="background:linear-gradient(135deg,#c05621,#ed8936)"></button>
          <button class="theme-swatch" data-theme="coral"  title="🪸 Coral Reef" onclick="setTheme('coral')"  style="background:linear-gradient(135deg,#c05621,#fc8c5a,#4fd1c5)"></button>
          <button class="theme-swatch" data-theme="solar"  title="☀️ Solar"      onclick="setTheme('solar')"  style="background:linear-gradient(135deg,#b7791f,#f6e05e)"></button>
        </div>
      </div>
    </div>

  </div>

  <!-- RESULTS PAGE -->
  <div class="container hidden" id="page-results">
    <div class="page-header">
      <button class="btn-back" onclick="showPage('home')">← Edit</button>
      <h1 class="title">Your Goals</h1>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:20px;align-items:center;flex-wrap:wrap;">
      <button class="btn-primary" onclick="addSavings()" style="margin-bottom:0;">➕ I saved money!</button>
      <button class="btn-secondary" id="notify-btn" onclick="enableNotifications()" style="white-space:nowrap">🔔 Remind me</button>
      <span id="streak-display" style="font-size:0.9rem;font-weight:600;color:var(--c-accent);"></span>
    </div>
    <div id="results"></div>
  </div>

  <!-- EDIT MODAL -->
  <div id="edit-modal" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(5,10,30,0.85);align-items:center;justify-content:center;">
    <div class="card" style="width:340px;max-width:90vw;">
      <h2>Edit Goal</h2>
      <div class="form-grid">
        <label>Item Name</label>
        <input type="text" id="edit-name" />
        <label>Cost ($)</label>
        <input type="number" id="edit-cost" />
        <label>Website URL</label>
        <input type="url" id="edit-url" />
        <label>Target Date</label>
        <input type="date" id="edit-deadline" />
        <label>Plan Type</label>
        <div class="toggle-group">
          <button class="toggle-btn active" data-val="save" onclick="setEditPlanType(this)">Saving Up</button>
          <button class="toggle-btn" data-val="payment" onclick="setEditPlanType(this)">Payment Plan</button>
        </div>
      </div>
      <div id="edit-payment-fields" class="payment-fields" style="display:none">
        <label>Monthly Payment ($)</label>
        <input type="number" id="edit-payment" />
      </div>
      <div style="display:flex;gap:10px;margin-top:16px;">
        <button class="btn-primary" style="margin-bottom:0" onclick="saveEditGoal()">Save Changes</button>
        <button class="btn-secondary" onclick="closeEditModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- SAVINGS MODAL -->
  <div id="savings-modal" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(5,10,30,0.85);align-items:center;justify-content:center;">
    <div class="card" style="width:320px;max-width:90vw;">
      <h2>Log Savings</h2>
      <div class="form-grid">
        <label>Amount ($)</label>
        <input type="number" id="savings-input" placeholder="e.g. 25" />
      </div>
      <div style="display:flex;gap:10px;margin-top:16px;">
        <button class="btn-primary" style="margin-bottom:0" onclick="confirmAddSavings()">Add</button>
        <button class="btn-secondary" onclick="document.getElementById('savings-modal').style.display='none'">Cancel</button>
      </div>
    </div>
  </div>

  <!-- CONFIRM MODAL -->
  <div id="confirm-modal" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(5,10,30,0.85);align-items:center;justify-content:center;">
    <div class="card" style="width:320px;max-width:90vw;text-align:center;">
      <p id="confirm-message" style="font-size:1rem;margin-bottom:20px;color:var(--c-text);">Are you sure?</p>
      <div style="display:flex;gap:10px;">
        <button class="btn-primary" id="confirm-yes" style="margin-bottom:0;background:linear-gradient(135deg,#c53030,#fc8181);">Delete</button>
        <button class="btn-secondary" id="confirm-no" style="flex:1;">Cancel</button>
      </div>
    </div>
  </div>

  <!-- NEW GOAL PAGE -->
  <div class="container hidden" id="page-new-goal">
    <div class="page-header">
      <button class="btn-back" onclick="showPage('home')">← Back</button>
      <h1 class="title">New Goal</h1>
    </div>

    <div class="card">
      <div class="form-grid">
        <label>Item Name</label>
        <input type="text" id="new-name" placeholder="e.g. MacBook" />
        <label>Cost ($)</label>
        <input type="number" id="new-cost" placeholder="e.g. 1000" />
        <label>Website URL</label>
        <input type="url" id="new-url" placeholder="e.g. https://apple.com/macbook" />
        <label>Target Date</label>
        <input type="date" id="new-deadline" />
        <label>Plan Type</label>
        <div class="toggle-group">
          <button class="toggle-btn active" data-val="save" onclick="setNewPlanType(this)">Saving Up</button>
          <button class="toggle-btn" data-val="payment" onclick="setNewPlanType(this)">Payment Plan</button>
        </div>
      </div>
      <div id="new-payment-fields" class="payment-fields" style="display:none">
        <label>Monthly Payment ($)</label>
        <input type="number" id="new-payment" placeholder="e.g. 20" />
      </div>
    </div>

    <button class="btn-primary" onclick="saveNewGoal()">Save Goal</button>
  </div>

  <script>
    const savedGoals = {{ goals | tojson }};
    let savingsHistory = {{ (savings_history if savings_history is defined else []) | tojson }};
    let goals = savedGoals.slice();
    let currentTaxRate = {{ tax_rate if tax_rate is not none else 0 }};

    function formatNum(n) {
      return (parseFloat(n) || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function getMondayWeekNum(dateStr) {
      const [year, month, day] = dateStr.split('-').map(Number);
      const d = new Date(year, month - 1, day);
      const dow = d.getDay() || 7;
      d.setDate(d.getDate() - (dow - 1));
      return Math.floor(d.getTime() / (7 * 24 * 60 * 60 * 1000));
    }

    function calculateStreaks(history) {
      if (!history.length) return { current: 0, best: 0 };
      const weekNums = [...new Set(history.map(e => getMondayWeekNum(e.date)))].sort((a, b) => a - b);
      let best = 1, run = 1;
      for (let i = 1; i < weekNums.length; i++) {
        if (weekNums[i] === weekNums[i - 1] + 1) { run++; if (run > best) best = run; }
        else run = 1;
      }
      const today = new Date();
      const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      const thisWeek = getMondayWeekNum(todayStr);
      const weekSet = new Set(weekNums);
      let current = 0, check = weekSet.has(thisWeek) ? thisWeek : thisWeek - 1;
      while (weekSet.has(check)) { current++; check--; }
      return { current, best: Math.max(best, current) };
    }

    function renderHomeGoals() {
      const slot = document.getElementById("home-goals-slot");
      if (!slot) return;
      if (!goals.length) { slot.innerHTML = ""; return; }
      slot.innerHTML = `
        <div class="card" style="margin-bottom:20px;">
          <h2>Your Goals (${goals.length})</h2>
          ${goals.map(g => `
            <div class="summary-row">
              <span>${g.name}</span>
              <span>$${formatNum(g.cost)}</span>
            </div>`).join("")}
        </div>`;
    }

    renderHomeGoals();

    // Mark active theme swatch on load
    document.querySelectorAll('.theme-swatch').forEach(s => {
      s.classList.toggle('active', s.dataset.theme === '{{ theme or "ocean" }}');
    });

    function showConfirm(message, onYes) {
      document.getElementById("confirm-message").textContent = message;
      const modal = document.getElementById("confirm-modal");
      modal.style.display = "flex";
      document.getElementById("confirm-yes").onclick = () => { modal.style.display = "none"; onYes(); };
      document.getElementById("confirm-no").onclick  = () => { modal.style.display = "none"; };
    }

    async function deleteSavings(index) {
      showConfirm("Remove this savings entry? Your balance will be reduced.", async () => {
        const res = await fetch("/delete-savings", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ index }),
        });
        const data = await res.json();
        document.getElementById("balance").value = data.balance;
        savingsHistory = data.history;
        calculate();
      });
    }

    async function setTheme(theme) {
      document.body.className = document.body.className
        .split(' ').filter(c => !c.startsWith('theme-')).join(' ');
      document.body.classList.add('theme-' + theme);
      document.querySelectorAll('.theme-swatch').forEach(s => {
        s.classList.toggle('active', s.dataset.theme === theme);
      });
      await fetch('/save-theme', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ theme }),
      });
    }

    async function autoSave() {
      const payload = {};
      const b = parseFloat(document.getElementById("balance").value);
      const inc = parseFloat(document.getElementById("income").value);
      const exp = parseFloat(document.getElementById("expenses").value);
      if (!isNaN(b))   payload.balance = b;
      if (!isNaN(inc)) payload.monthly_income = inc;
      if (!isNaN(exp)) payload.monthly_expenses = exp;
      if (!Object.keys(payload).length) return;
      await fetch("/save-info", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
    }

    async function saveState() {
      const state = document.getElementById("state-input").value.trim().toUpperCase();
      if (!state) return alert("Enter a 2-letter state code like NY or CA.");
      const res = await fetch("/save-state", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ state }),
      });
      if (!res.ok) return alert("Unknown state. Use a 2-letter code like NY.");
      const data = await res.json();
      currentTaxRate = data.tax_rate;
      document.getElementById("tax-display").textContent = `${data.tax_rate}% (${data.state})`;
    }

    function showPage(name) {
      document.querySelectorAll(".container").forEach(el => el.classList.add("hidden"));
      document.getElementById("page-" + name).classList.remove("hidden");
      if (name === "home") renderHomeGoals();
    }

    function setNewPlanType(btn) {
      document.querySelectorAll("#page-new-goal .toggle-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("new-payment-fields").style.display = btn.dataset.val === "payment" ? "grid" : "none";
    }

    async function saveNewGoal() {
      const name = document.getElementById("new-name").value.trim();
      const cost = parseFloat(document.getElementById("new-cost").value);
      const planType = document.querySelector("#page-new-goal .toggle-btn.active").dataset.val;
      const monthly_payment = parseFloat(document.getElementById("new-payment").value) || 0;
      const url = document.getElementById("new-url").value.trim();
      const deadline = document.getElementById("new-deadline").value || "";

      if (!name || !cost) {
        alert("Please fill in item name and cost.");
        return;
      }

      goals.push({ name, cost, plan_type: planType, monthly_payment, url, deadline, added_on: "" });

      document.getElementById("new-name").value = "";
      document.getElementById("new-cost").value = "";
      document.getElementById("new-payment").value = "";
      document.getElementById("new-url").value = "";
      document.getElementById("new-deadline").value = "";

      showPage("home");
    }

    function timeString(months) {
      if (!months || months <= 0) return "Goal reached!";
      if (months < 1) return "Less than a month";
      if (months < 12) return `${months.toFixed(1)} months`;
      const years = (months / 12).toFixed(1);
      return `${years} years (${Math.round(months)} months)`;
    }

    async function enableNotifications() {
      if (!("Notification" in window) || !("serviceWorker" in navigator)) {
        return alert("Your browser doesn't support notifications.");
      }
      const permission = await Notification.requestPermission();
      if (permission !== "granted") {
        return showToast("❌ Notifications blocked — check your browser settings.");
      }
      const keyRes = await fetch("/vapid-public-key");
      const { key } = await keyRes.json();
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: key,
      });
      await fetch("/subscribe", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(sub),
      });
      document.getElementById("notify-btn").textContent = "📲 Send reminder";
      document.getElementById("notify-btn").onclick = sendReminder;
      showToast("🔔 Reminders enabled!");
    }

    async function sendReminder() {
      const res = await fetch("/send-reminder", { method: "POST" });
      if (res.ok) showToast("📲 Reminder sent to your phone!");
      else showToast("❌ Couldn't send — check Render env vars.");
    }

    let toastTimer = null;
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove("show"), 3500);
    }

    let editingIndex = null;

    function openEditModal(r) {
      editingIndex = r.goal_index;
      const goal = goals[editingIndex];
      document.getElementById("edit-name").value = goal.name;
      document.getElementById("edit-cost").value = goal.cost;
      document.getElementById("edit-url").value = goal.url || "";
      document.getElementById("edit-payment").value = goal.monthly_payment || "";
      document.getElementById("edit-deadline").value = goal.deadline || "";
      const planType = goal.plan_type || "save";
      document.querySelectorAll("#edit-modal .toggle-btn").forEach(b => {
        b.classList.toggle("active", b.dataset.val === planType);
      });
      document.getElementById("edit-payment-fields").style.display = planType === "payment" ? "grid" : "none";
      document.getElementById("edit-modal").style.display = "flex";
    }

    function closeEditModal() {
      document.getElementById("edit-modal").style.display = "none";
      editingIndex = null;
    }

    function setEditPlanType(btn) {
      document.querySelectorAll("#edit-modal .toggle-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("edit-payment-fields").style.display = btn.dataset.val === "payment" ? "grid" : "none";
    }

    async function saveEditGoal() {
      const name = document.getElementById("edit-name").value.trim();
      const cost = parseFloat(document.getElementById("edit-cost").value);
      const planType = document.querySelector("#edit-modal .toggle-btn.active").dataset.val;
      const monthly_payment = parseFloat(document.getElementById("edit-payment").value) || 0;
      const url = document.getElementById("edit-url").value.trim();
      const deadline = document.getElementById("edit-deadline").value || "";
      if (!name || !cost) return alert("Name and cost are required.");
      await fetch("/edit-goal", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ index: editingIndex, name, cost, plan_type: planType, monthly_payment, url, deadline }),
      });
      goals[editingIndex] = { ...goals[editingIndex], name, cost, plan_type: planType, monthly_payment, url, deadline };
      closeEditModal();
      calculate();
    }

    function renderChart(currentBalance) {
      const existing = document.getElementById("chart-card");
      if (existing) existing.remove();
      if (!savingsHistory.length) {
        const empty = document.createElement("div");
        empty.className = "card summary-card card-accent-purple card-enter";
        empty.style.setProperty('--card-delay', '60ms');
        empty.id = "chart-card";
        empty.innerHTML = `<h2>Allowance Fluctuations</h2><p style="color:var(--c-text-dim);text-align:center;padding:24px 0;">No savings logged yet — tap <strong style="color:var(--c-accent);">➕ I saved money!</strong> to start tracking.</p>`;
        document.getElementById("results").appendChild(empty);
        return;
      }

      const chronological = [...savingsHistory].reverse();
      let running = 0;
      const labels = [];
      const dataPoints = [];
      for (const entry of chronological) {
        running = Math.round((running + parseFloat(entry.amount)) * 100) / 100;
        labels.push(entry.date);
        dataPoints.push(running);
      }

      const card = document.createElement("div");
      card.className = "card summary-card card-accent-purple card-enter";
      card.style.setProperty('--card-delay', '60ms');
      card.id = "chart-card";
      card.innerHTML = `<h2>Allowance Fluctuations</h2><div style="position:relative;height:200px;"><canvas id="savings-canvas"></canvas></div>`;
      document.getElementById("results").appendChild(card);

      const canvas = document.getElementById("savings-canvas");
      const ctx = canvas.getContext("2d");

      const gradient = ctx.createLinearGradient(0, 0, 0, 200);
      gradient.addColorStop(0, "rgba(72,187,120,0.5)");
      gradient.addColorStop(1, "rgba(72,187,120,0)");

      const glowPlugin = {
        id: "glow",
        beforeDatasetsDraw(chart) {
          chart.ctx.save();
          chart.ctx.shadowColor = "#48bb78";
          chart.ctx.shadowBlur = 14;
        },
        afterDatasetsDraw(chart) { chart.ctx.restore(); }
      };

      const datasets = [{
        data: dataPoints,
        borderColor: "#48bb78",
        backgroundColor: gradient,
        borderWidth: 2.5,
        pointRadius: 5,
        pointHoverRadius: 8,
        pointBackgroundColor: "#48bb78",
        pointBorderColor: "rgba(255,255,255,0.8)",
        pointBorderWidth: 1.5,
        pointHoverBackgroundColor: "#9ae6b4",
        pointHoverBorderColor: "#fff",
        pointHoverBorderWidth: 2,
        fill: true,
        tension: 0.35,
        label: "Logged savings",
      }];

      if (currentBalance > 0 && labels.length >= 1) {
        datasets.push({
          data: Array(labels.length).fill(currentBalance),
          borderColor: "rgba(99,179,237,0.55)",
          borderDash: [6, 4],
          borderWidth: 1.5,
          pointRadius: 0,
          fill: false,
          tension: 0,
          label: "Current balance",
        });
      }

      new Chart(ctx, {
        type: "line",
        data: { labels, datasets },
        plugins: [glowPlugin],
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 1200, easing: "easeInOutQuart" },
          plugins: {
            legend: {
              display: currentBalance > 0,
              labels: { color: "#a0aec0", boxWidth: 14, font: { size: 11 } }
            },
            tooltip: {
              callbacks: {
                label: ctx => `${ctx.dataset.label}: $${parseFloat(ctx.raw).toFixed(2)}`
              }
            }
          },
          scales: {
            x: { ticks: { color: "#a0aec0", maxTicksLimit: 7 }, grid: { color: "rgba(255,255,255,0.05)" } },
            y: { ticks: { color: "#a0aec0", callback: v => `$${v}` }, grid: { color: "rgba(255,255,255,0.05)" } }
          }
        }
      });
    }

    function renderHistory() {
      const existing = document.getElementById("history-card");
      if (existing) existing.remove();
      if (!savingsHistory.length) return;

      // Compute running totals oldest→newest, display newest→oldest
      let cum = 0;
      const totals = [...savingsHistory].reverse().map(e => {
        cum = Math.round((cum + parseFloat(e.amount)) * 100) / 100;
        return cum;
      }).reverse();

      const card = document.createElement("div");
      card.className = "card summary-card card-accent-green card-enter";
      card.style.setProperty('--card-delay', '0ms');
      card.id = "history-card";
      card.innerHTML = `
        <h2>Savings Log</h2>
        ${savingsHistory.map((e, i) => `
          <div class="history-row">
            <span class="green" style="font-weight:600;">+$${formatNum(e.amount)}</span>
            <span class="history-date">${e.date}</span>
            <span style="color:var(--c-text-dim);font-size:0.8rem;">total $${formatNum(totals[i])}</span>
            <button class="history-delete-btn" onclick="deleteSavings(${i})">✕</button>
          </div>`).join("")}
      `;
      document.getElementById("results").appendChild(card);
    }

    function addSavings() {
      document.getElementById("savings-input").value = "";
      document.getElementById("savings-modal").style.display = "flex";
      setTimeout(() => document.getElementById("savings-input").focus(), 50);
    }

    async function confirmAddSavings() {
      const amount = parseFloat(document.getElementById("savings-input").value);
      if (!amount || amount <= 0) return;
      document.getElementById("savings-modal").style.display = "none";
      const res = await fetch("/add-savings", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ amount }),
      });
      const data = await res.json();
      document.getElementById("balance").value = data.balance;
      savingsHistory = data.history;
      calculate();
    }

    async function calculate() {
      const balance = parseFloat(document.getElementById("balance").value);
      const monthly_income = parseFloat(document.getElementById("income").value);
      const monthly_expenses = parseFloat(document.getElementById("expenses").value);

      if (!goals.length) {
        alert("Add at least one goal first.");
        return;
      }

      const res = await fetch("/calculate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ balance, monthly_income, monthly_expenses, goals, tax_rate: currentTaxRate }),
      });

      const data = await res.json();
      goals = data.saved_goals;
      const results = data.results;
      const summary = data.summary;
      showPage("results");
      const container = document.getElementById("results");
      container.innerHTML = "";

      const { current: streakCurrent, best: streakBest } = calculateStreaks(savingsHistory);
      const streakEl = document.getElementById("streak-display");
      if (streakEl) {
        streakEl.textContent = streakCurrent > 0 ? `🔥 ${streakCurrent}-week streak!` : "";
      }

      if (results.length === 0) return;

      // Celebrate any reached goals
      const reached = results.filter(r => r.already_have);
      if (reached.length) {
        confetti({ particleCount: 150, spread: 80, origin: { y: 0.5 } });
        setTimeout(() => confetti({ particleCount: 80, spread: 120, origin: { y: 0.3 } }), 400);
        const names = reached.map(r => r.name).join(" & ");
        showToast(`🎉 You can afford ${names}!`);
      }

      // Savings history + chart
      renderHistory();
      renderChart(balance);

      // Total dashboard (adds up all goals)
      const stillNeeded = Math.max(0, summary.total_cost - summary.total_saved);
      const dash = document.createElement("div");
      dash.className = "card summary-card card-accent-green card-enter";
      dash.style.setProperty('--card-delay', '120ms');
      dash.innerHTML = `
        <h2>Your Progress</h2>
        <div class="summary-row"><span>Total for all goals</span><span>$${formatNum(summary.total_cost)}</span></div>
        <div class="summary-row"><span>Saved so far</span><span class="green">$${formatNum(summary.total_saved)}</span></div>
        <div class="summary-row"><span>Still needed</span><span class="red">$${formatNum(stillNeeded)}</span></div>
        <div class="summary-row"><span>Goals reached</span><span class="cyan">${summary.goals_reached} of ${summary.goals_count}</span></div>
        <div class="summary-row"><span>Current streak</span><span class="yellow">${streakCurrent > 0 ? '🔥 ' + streakCurrent + ' week' + (streakCurrent === 1 ? '' : 's') : '—'}</span></div>
        <div class="summary-row"><span>Best streak</span><span class="yellow">${streakBest > 0 ? '🏆 ' + streakBest + ' week' + (streakBest === 1 ? '' : 's') : '—'}</span></div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${summary.overall_pct}%"></div></div>
        <div class="progress-label">${summary.overall_pct}% of the way to everything</div>
      `;
      container.appendChild(dash);

      // Tab bar
      const tabBar = document.createElement("div");
      tabBar.className = "tab-bar";
      results.forEach((r, i) => {
        const tab = document.createElement("button");
        tab.className = "tab-btn" + (i === 0 ? " active" : "");
        tab.textContent = (r.is_priority ? "⭐ " : "") + r.name;
        tab.onclick = () => {
          document.querySelectorAll(".tab-btn").forEach(t => t.classList.remove("active"));
          document.querySelectorAll(".tab-panel").forEach(p => p.style.display = "none");
          tab.classList.add("active");
          document.getElementById(`panel-${i}`).style.display = "block";
        };
        tabBar.appendChild(tab);
      });
      container.appendChild(tabBar);

      // Tab panels
      results.forEach((r, i) => {
        const accentClass = r.already_have ? "card-accent-green" : r.is_priority ? "card-accent-gold" : "card-accent-blue";
        const panel = document.createElement("div");
        panel.className = `result-card tab-panel card-enter ${accentClass}`;
        panel.style.display = i === 0 ? "block" : "none";
        panel.style.setProperty('--card-delay', `${180 + i * 50}ms`);
        panel.id = `panel-${i}`;

        let contentHTML = "";
        const buyBtn = r.url ? `<a href="${r.url}" target="_blank" class="btn-buy">🛒 Buy Now</a>` : "";
        const badge = r.is_priority ? `<div class="priority-badge">⭐ Get this first!</div>` : "";
        if (r.already_have) {
          contentHTML = `<div class="reached-banner">🎉 Goal Reached!</div><h3>${r.name}</h3>${badge}<p class="green">You already have enough!</p>${buyBtn}`;
        } else if ((r.plan_type || "save") === "save") {
          const progressPct = r.months_to_save ? Math.min(100, Math.round((r.months_elapsed / r.months_to_save) * 100)) : 0;
          const deadlineHTML = r.deadline_info ? `
            <div class="option" style="margin-top:10px;border-color:${r.deadline_info.on_track ? 'rgba(72,187,120,0.3)' : 'rgba(252,129,129,0.3)'};">
              <div class="option-title cyan">⏰ Target: ${r.deadline_info.deadline}</div>
              <div class="option-row"><span>Months to deadline</span><span>${r.deadline_info.months}</span></div>
              <div class="option-row"><span>Need per month</span><span class="${r.deadline_info.on_track ? 'green' : 'red'}">$${formatNum(r.deadline_info.monthly_needed)}</span></div>
              <div class="option-row"><span>Status</span><span class="${r.deadline_info.on_track ? 'green' : 'red'}">${r.deadline_info.on_track ? '✅ On track' : '⚠️ Need more savings'}</span></div>
            </div>` : "";
          contentHTML = `
            <h3>${r.name}</h3>${badge}
            <p class="needed">You need <strong>$${formatNum(r.needed)}</strong> more.</p>
            <div class="option full-width">
              <div class="option-title green">Saving Up</div>
              <div class="option-row"><span>Total time needed</span><span>${timeString(r.months_to_save)}</span></div>
              <div class="option-row"><span>Time remaining</span><span class="cyan">${timeString(r.months_remaining)}</span></div>
              ${r.away_hits && r.away_hits.length ? `<div class="option-row yellow"><span>⛺ Away periods factored in</span><span>${r.away_hits.map(a => a.event).filter((v,i,arr) => arr.indexOf(v)===i).join(", ")}</span></div>` : ""}
              <div class="option-row"><span>Price + tax</span><span>$${formatNum(r.cost)} <span class="yellow">(+$${formatNum(r.tax_amount||0)} tax)</span></span></div>
              <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${progressPct}%"></div></div>
              <div class="progress-label">${progressPct}% of the way there</div>
            </div>
            ${deadlineHTML}
            ${buyBtn}
          `;
        } else {
          const verdictClass = !r.can_afford ? "red" : r.total_paid > r.cost ? "yellow" : "green";
          let verdict = "";
          if (!r.can_afford) verdict = `Payment plan not affordable — you're $${formatNum(r.shortage)} short each month.`;
          else if (r.total_paid > r.cost) verdict = `Payment plan costs $${formatNum(r.total_paid - r.cost)} more than the price.`;
          else verdict = "Payment plan costs the same — get it now if you want.";

          contentHTML = `
            <h3>${r.name}</h3>${badge}
            <p class="needed">You need <strong>$${formatNum(r.needed)}</strong> more.</p>
            <div class="option full-width">
              <div class="option-title purple">Payment Plan</div>
              <div class="option-row"><span>Monthly payment</span><span>$${formatNum(r.monthly_payment||0)} × ${r.num_payments || 0} months</span></div>
              <div class="option-row"><span>Price + tax</span><span>$${formatNum(r.cost)} <span class="yellow">(+$${formatNum(r.tax_amount||0)} tax)</span></span></div>
              <div class="option-row"><span>Total paid</span><span>$${formatNum(r.total_paid||0)}</span></div>
              <div class="option-row"><span>${r.can_afford ? "Leftover/month" : "Shortage/month"}</span>
                <span class="${r.can_afford ? 'green' : 'red'}">${r.can_afford ? '+' : '-'}$${r.can_afford ? formatNum(r.leftover) : formatNum(r.shortage)}</span>
              </div>
            </div>
            <div class="verdict ${verdictClass}">${verdict}</div>
            ${buyBtn}
          `;
        }

        panel.style.position = "relative";

        const btnRow = document.createElement("div");
        btnRow.style.cssText = "display:flex;justify-content:flex-end;gap:8px;margin-bottom:12px;";

        const editBtn = document.createElement("button");
        editBtn.className = "btn-secondary";
        editBtn.textContent = "✏️ Edit";
        editBtn.style.cssText = "padding:6px 14px;font-size:0.8rem;";
        editBtn.onclick = () => openEditModal(r);
        btnRow.appendChild(editBtn);

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "btn-delete-goal";
        deleteBtn.textContent = "✕ Delete";
        btnRow.appendChild(deleteBtn);

        panel.innerHTML = contentHTML;
        panel.insertBefore(btnRow, panel.firstChild);

        deleteBtn.onclick = () => {
          showConfirm(`Delete "${r.name}"?`, async () => {
            await fetch("/delete-goal", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ index: r.goal_index }),
            });
            goals.splice(r.goal_index, 1);
            calculate();
          });
        };
        container.appendChild(panel);
      });

      // Monthly Summary at the bottom
      const summaryCard = document.createElement("div");
      summaryCard.className = "card summary-card card-accent-blue card-enter";
      summaryCard.style.setProperty('--card-delay', '240ms');
      summaryCard.innerHTML = `
        <h2>Monthly Summary</h2>
        <div class="summary-row"><span>Spendable income</span><span>$${formatNum(summary.spendable)}</span></div>
        <div class="summary-row"><span>That's per week</span><span class="cyan">$${formatNum(summary.weekly)}</span></div>
        <div class="summary-row"><span>That's per day</span><span class="cyan">$${formatNum(summary.daily)}</span></div>
        <div class="summary-row"><span>Total payment plans</span><span class="red">-$${formatNum(summary.total_monthly_payments)}</span></div>
        <div class="summary-divider"></div>
        <div class="summary-row summary-total"><span>Left each month</span><span class="${summary.left_after_all >= 0 ? 'green' : 'red'}">$${formatNum(summary.left_after_all)}</span></div>
      `;
      container.appendChild(summaryCard);
    }

    // Background upload
    document.getElementById("bg-upload").addEventListener("change", async function () {
      const file = this.files[0];
      if (!file) return;
      const form = new FormData();
      form.append("background", file);
      const res = await fetch("/upload-background", { method: "POST", body: form });
      const data = await res.json();
      document.getElementById("app").style.backgroundImage = `url('/static/${data.background}')`;
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }
  </script>
</body>
</html>
